name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # 매일 00:00 UTC (09:00 KST)
  workflow_dispatch: # 수동 실행용

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 잔디 스네이크 SVG 생성
        uses: Platane/snk@v3
        with:
          github_user_name: seonwooj0810
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: output 브랜치에 배포
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
